services:
  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_USER=pusername
      - POSTGRES_PASSWORD=ppassword
      - POSTGRES_DB=Random
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/var/lib/redis/data

volumes:
  postgres-data:
  redis-data:
